name: Build Android APK

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*' # Trigger build khi push tag v1.0.0, v1.0.1...
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # Cho phép kích hoạt build thủ công từ giao diện Web của GitHub

jobs:
  build:
    name: Build Flutter APK
    runs-on: ubuntu-latest
    permissions:
      contents: write # Cấp quyền ghi để tạo Release và upload APK

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate files
        run: |
          dart run build_runner build --delete-conflicting-outputs
          dart pub global activate flutter_gen 5.5.0+1
          fluttergen

      - name: Build APK
        run: |
          flutter build apk \
            --release \
            --no-tree-shake-icons \
            --obfuscate \
            --split-debug-info=./symbols

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: xlist-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Create Release and Upload APK
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
